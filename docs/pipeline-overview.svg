<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#FAF5F0" rx="12"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="70" fill="#CC2229" rx="12"/>
  <rect x="0" y="40" width="800" height="30" fill="#CC2229"/>
  <text x="400" y="45" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="bold">六階段製作流程</text>

  <!-- ======== Row 1: Phase 1 → 2 → 3 (left to right) ======== -->

  <!-- Phase 1 -->
  <rect x="40" y="95" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#E0D5CA" stroke-width="1.5"/>
  <circle cx="70" cy="120" r="18" fill="#CC2229"/>
  <text x="70" y="126" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">1</text>
  <text x="98" y="126" fill="#1A1A1A" font-size="16" font-weight="bold">主題規劃</text>
  <line x1="55" y1="142" x2="250" y2="142" stroke="#F0E8E0" stroke-width="1"/>
  <text x="55" y="163" fill="#555" font-size="12">• 角色概念設定</text>
  <text x="55" y="182" fill="#555" font-size="12">• 視覺風格定調</text>
  <text x="55" y="201" fill="#555" font-size="12">• 表情/情境清單</text>
  <text x="55" y="220" fill="#555" font-size="12">• 文字語言選擇</text>
  <text x="55" y="239" fill="#CC2229" font-size="11" font-weight="bold">↳ 先規劃全部再動手</text>

  <!-- Arrow 1→2 (pointing right) -->
  <polygon points="285,170 270,160 270,180" fill="#CC2229"/>

  <!-- Phase 2 -->
  <rect x="290" y="95" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#E0D5CA" stroke-width="1.5"/>
  <circle cx="320" cy="120" r="18" fill="#CC2229"/>
  <text x="320" y="126" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">2</text>
  <text x="348" y="126" fill="#1A1A1A" font-size="16" font-weight="bold">角色設計</text>
  <line x1="305" y1="142" x2="500" y2="142" stroke="#F0E8E0" stroke-width="1"/>
  <text x="305" y="163" fill="#555" font-size="12">• 建立 Style Anchor</text>
  <text x="305" y="182" fill="#555" font-size="12">• 固定 prompt 前綴</text>
  <text x="305" y="201" fill="#555" font-size="12">• 防護語句配置</text>
  <text x="305" y="220" fill="#555" font-size="12">• 測試生成 1-2 張</text>
  <text x="305" y="239" fill="#CC2229" font-size="11" font-weight="bold">↳ 一致性的關鍵</text>

  <!-- Arrow 2→3 (pointing right) -->
  <polygon points="535,170 520,160 520,180" fill="#CC2229"/>

  <!-- Phase 3 -->
  <rect x="540" y="95" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#E0D5CA" stroke-width="1.5"/>
  <circle cx="570" cy="120" r="18" fill="#1A1A1A"/>
  <text x="570" y="126" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">3</text>
  <text x="598" y="126" fill="#1A1A1A" font-size="16" font-weight="bold">批次生成</text>
  <line x1="555" y1="142" x2="750" y2="142" stroke="#F0E8E0" stroke-width="1"/>
  <text x="555" y="163" fill="#555" font-size="12">• 每批 4 張並行生成</text>
  <text x="555" y="182" fill="#555" font-size="12">• 即時審查每批產出</text>
  <text x="555" y="201" fill="#555" font-size="12">• 保存原始高解析度</text>
  <text x="555" y="220" fill="#555" font-size="12">• 統一命名規則</text>
  <text x="555" y="239" fill="#1A1A1A" font-size="11" font-weight="bold">↳ 分批降低重做成本</text>

  <!-- Arrow 3→4 (pointing DOWN): line + arrowhead at bottom only -->
  <line x1="652" y1="255" x2="652" y2="290" stroke="#CC2229" stroke-width="2"/>
  <polygon points="652,300 642,288 662,288" fill="#CC2229"/>

  <!-- ======== Row 2: Phase 4 → 5 → 6 (right to left) ======== -->

  <!-- Phase 4 (right side, below Phase 3) -->
  <rect x="540" y="300" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#CC2229" stroke-width="2"/>
  <circle cx="570" cy="325" r="18" fill="#CC2229"/>
  <text x="570" y="331" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">4</text>
  <text x="598" y="331" fill="#CC2229" font-size="16" font-weight="bold">品質審查 ★</text>
  <line x1="555" y1="347" x2="750" y2="347" stroke="#F0E8E0" stroke-width="1"/>
  <text x="555" y="368" fill="#555" font-size="12">• 必修：重複角色、符號</text>
  <text x="555" y="387" fill="#555" font-size="12">• 應修：居中、大小一致</text>
  <text x="555" y="406" fill="#555" font-size="12">• 可修：表情清晰度</text>
  <text x="555" y="425" fill="#555" font-size="12">• 逐項檢查不放過</text>
  <text x="555" y="444" fill="#CC2229" font-size="11" font-weight="bold">↳ 最重要的一步！</text>

  <!-- Arrow 4→5 (pointing left) -->
  <polygon points="520,375 535,365 535,385" fill="#CC2229"/>

  <!-- Phase 5 (middle) -->
  <rect x="290" y="300" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#E0D5CA" stroke-width="1.5"/>
  <circle cx="320" cy="325" r="18" fill="#1A1A1A"/>
  <text x="320" y="331" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">5</text>
  <text x="348" y="331" fill="#1A1A1A" font-size="16" font-weight="bold">後製處理</text>
  <line x1="305" y1="347" x2="500" y2="347" stroke="#F0E8E0" stroke-width="1"/>
  <text x="305" y="368" fill="#555" font-size="12">• 去白底 → 透明 PNG</text>
  <text x="305" y="387" fill="#555" font-size="12">• 縮放至 370×320</text>
  <text x="305" y="406" fill="#555" font-size="12">• 生成 main + tab</text>
  <text x="305" y="425" fill="#555" font-size="12">• padding 微調大小</text>
  <text x="305" y="444" fill="#1A1A1A" font-size="11" font-weight="bold">↳ 一行指令自動完成</text>

  <!-- Arrow 5→6 (pointing left) -->
  <polygon points="270,375 285,365 285,385" fill="#CC2229"/>

  <!-- Phase 6 (left side) -->
  <rect x="40" y="300" width="225" height="155" fill="#FFFFFF" rx="10" stroke="#E0D5CA" stroke-width="1.5"/>
  <circle cx="70" cy="325" r="18" fill="#1A1A1A"/>
  <text x="70" y="331" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="bold">6</text>
  <text x="98" y="331" fill="#1A1A1A" font-size="16" font-weight="bold">最終檢查</text>
  <line x1="55" y1="347" x2="250" y2="347" stroke="#F0E8E0" stroke-width="1"/>
  <text x="55" y="368" fill="#555" font-size="12">• 驗證所有尺寸</text>
  <text x="55" y="387" fill="#555" font-size="12">• 確認檔案 ≤ 1MB</text>
  <text x="55" y="406" fill="#555" font-size="12">• 小尺寸預覽測試</text>
  <text x="55" y="425" fill="#555" font-size="12">• 產出總表報告</text>
  <text x="55" y="444" fill="#1A1A1A" font-size="11" font-weight="bold">↳ 上架前最後把關</text>

  <!-- Watermark -->
  <text x="755" y="488" text-anchor="end" fill="#AAAAAA" font-size="12">https://www.vista.tw</text>
</svg>